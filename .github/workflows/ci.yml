name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install storefront dependencies
        working-directory: storefront
        run: npm ci
      - name: Lint storefront
        working-directory: storefront
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install storefront deps
        working-directory: storefront
        run: npm ci
      - name: TypeScript check storefront
        working-directory: storefront
        run: npm run typecheck
      - name: Install backend deps
        working-directory: backend/medusa
        run: npm ci
      - name: TypeScript check backend
        working-directory: backend/medusa
        run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build storefront
        working-directory: storefront
        run: npm ci && npm run build
      - name: Build backend
        working-directory: backend/medusa
        run: npm ci && npm run build

  test:
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medusa_test
          POSTGRES_USER: medusa
          POSTGRES_PASSWORD: medusa
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install backend deps
        working-directory: backend/medusa
        run: npm ci
      - name: Run unit tests
        working-directory: backend/medusa
        run: npm run test:unit
      - name: Run integration tests
        working-directory: backend/medusa
        run: npm run test:integration:http
        env:
          DATABASE_URL: postgres://medusa:medusa@localhost:5432/medusa_test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit storefront
        working-directory: storefront
        run: npm audit --audit-level=high
      - name: Audit backend
        working-directory: backend/medusa
        run: npm audit --audit-level=high
