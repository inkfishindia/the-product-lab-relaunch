<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--dark:#1A1A1A;--cream:#F5F0EB;--red:#E63B2E;--yellow:#F2D024;--card-bg:#EDE8E3;--sidebar-w:280px}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--dark);background:var(--cream)}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:0.01em}
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--dark);color:#ccc;display:flex;flex-direction:column;overflow:hidden}
.sidebar h1{padding:20px 18px 12px;font-size:22px;color:#fff;letter-spacing:0.05em;border-bottom:1px solid #333}
.sidebar h1 span{color:var(--red)}
.sidebar .cat-count{padding:8px 18px 10px;font-size:11px;color:#888;font-family:'Inter',sans-serif;border-bottom:1px solid #333}
.cat-tree{flex:1;overflow-y:auto;padding:8px 0}
.cat-tree::-webkit-scrollbar{width:5px}
.cat-tree::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.cat-item{cursor:pointer;user-select:none}
.cat-header{display:flex;align-items:center;padding:7px 18px;font-size:13px;color:#bbb;transition:.15s;gap:6px;font-family:'Barlow Condensed',sans-serif;font-weight:500;letter-spacing:0.02em}
.cat-header:hover{background:rgba(255,255,255,.06);color:var(--yellow)}
.cat-header .arrow{font-size:10px;transition:transform .2s;width:12px;text-align:center;color:#666}
.cat-header .arrow.open{transform:rotate(90deg)}
.cat-header .badge{background:#333;color:#999;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:auto;font-family:'Inter',sans-serif}
.cat-header.active{color:var(--yellow);background:rgba(242,208,36,.08)}
.cat-children{display:none}
.cat-children.open{display:block}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}
.topbar{background:var(--cream);padding:14px 24px;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar .brand{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;color:var(--dark);white-space:nowrap}
.topbar .brand span{color:var(--red)}
.search-wrap{flex:1;min-width:180px;max-width:420px}
.search-wrap input{width:100%;padding:8px 14px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;outline:none;transition:.15s;font-family:'Inter',sans-serif}
.search-wrap input:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(230,59,46,.12)}
.view-all-btn{padding:7px 16px;border:1px solid var(--dark);border-radius:6px;background:transparent;cursor:pointer;font-size:12px;font-weight:500;transition:.15s;font-family:'Inter',sans-serif}
.view-all-btn:hover{background:var(--dark);color:#fff}
.counter{font-size:12px;color:#888;white-space:nowrap}
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.file-card{background:var(--card-bg);border-radius:8px;padding:12px 14px;cursor:pointer;transition:.15s;border:1px solid transparent}
.file-card:hover{background:#e5ddd6;border-color:var(--yellow);transform:translateY(-1px)}
.file-card.active{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
.file-card .fname{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--dark);margin-bottom:2px}
.file-card .fpath{font-size:11px;color:#888;margin-bottom:6px;word-break:break-all;font-family:'Inter',sans-serif}
.file-card .fmeta{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:4px;font-weight:500;font-family:'Inter',sans-serif}
.badge-phase{background:var(--dark);color:#fff}
.badge-type{background:var(--red);color:#fff}
.badge-agent{background:var(--yellow);color:var(--dark)}
.badge-lines{background:#ccc;color:var(--dark)}
.file-card .fdesc{font-size:11px;color:#777;margin-top:4px;font-style:italic}
.preview-pane{background:var(--cream);border-top:1px solid #ddd;margin-top:16px;display:none;flex-direction:column}
.preview-pane.open{display:flex}
.preview-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--card-bg);border-radius:8px 8px 0 0}
.preview-header .ptitle{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600}
.preview-header .pclose{cursor:pointer;background:none;border:none;font-size:18px;color:#888;padding:0 4px}
.preview-header .pclose:hover{color:var(--red)}
.preview-body{padding:16px;background:#fff;border-radius:0 0 8px 8px;overflow-x:auto;max-height:50vh;overflow-y:auto;line-height:1.6;font-size:13px}
.preview-body iframe{width:100%;height:480px;border:none;border-radius:4px}
.preview-body img{max-width:100%;border-radius:4px}
.preview-body pre{background:#f8f6f4;padding:12px;border-radius:6px;overflow-x:auto;font-size:12px;line-height:1.5}
.preview-body code{background:#f0ece8;padding:1px 4px;border-radius:3px;font-size:12px}
.preview-body pre code{background:none;padding:0}
.preview-body h1{font-size:20px;margin:16px 0 8px;font-family:'Barlow Condensed',sans-serif}
.preview-body h2{font-size:17px;margin:14px 0 6px;font-family:'Barlow Condensed',sans-serif}
.preview-body h3{font-size:15px;margin:12px 0 5px;font-family:'Barlow Condensed',sans-serif}
.preview-body h4{font-size:14px;margin:10px 0 4px;font-family:'Barlow Condensed',sans-serif}
.preview-body p{margin:6px 0}
.preview-body ul,.preview-body ol{padding-left:20px;margin:6px 0}
.preview-body li{margin:2px 0}
.preview-body hr{border:none;border-top:1px solid #ddd;margin:16px 0}
.preview-body a{color:var(--red);text-decoration:underline}
.preview-body table{border-collapse:collapse;width:100%;margin:10px 0;font-size:12px}
.preview-body th,.preview-body td{border:1px solid #ddd;padding:6px 10px;text-align:left}
.preview-body th{background:var(--card-bg);font-family:'Barlow Condensed',sans-serif;font-weight:600}
.preview-body strong{font-weight:600}
.preview-body blockquote{border-left:3px solid var(--red);padding:4px 12px;margin:8px 0;background:#faf8f5;color:#555}
.spinner{display:flex;justify-content:center;align-items:center;padding:40px;gap:8px;color:#888}
.spinner::after{content:'';width:20px;height:20px;border:2px solid #ddd;border-top-color:var(--red);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty h3{font-size:20px;color:#bbb}
.file-grid.hidden{display:none}
.live-btn{padding:7px 16px;border:1px solid var(--red);border-radius:6px;background:transparent;cursor:pointer;font-size:12px;font-weight:500;transition:.15s;font-family:'Inter',sans-serif;color:var(--red)}
.live-btn:hover,.live-btn.active{background:var(--red);color:#fff}
.live-btn.active{border-color:var(--red)}
.live-view{display:none;flex-direction:column;flex:1;min-height:0}
.live-view.open{display:flex}
.live-tabs{display:flex;gap:4px;padding:10px 0;overflow-x:auto;flex-wrap:nowrap;border-bottom:1px solid #ddd}
.live-tab{padding:7px 14px;border:1px solid #ddd;border-radius:6px 6px 0 0;background:var(--card-bg);cursor:pointer;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:500;white-space:nowrap;transition:.15s;border-bottom:none;color:var(--dark)}
.live-tab:hover{background:#e0d8d0}
.live-tab.active{background:#fff;border-color:#ccc;color:var(--dark);font-weight:600;position:relative}
.live-tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#fff}
.live-tab .tab-badge{font-size:9px;background:var(--red);color:#fff;padding:1px 6px;border-radius:8px;margin-left:6px;font-family:'Inter',sans-serif}
.live-frame-wrap{flex:1;background:#fff;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;min-height:0;position:relative}
.live-frame-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block}
.file-view{display:flex;flex-direction:column;flex:1;overflow:hidden}
.file-view.hidden{display:none}
@media(max-width:768px){
  .sidebar{display:none}
  .file-grid{grid-template-columns:1fr}
  .topbar{padding:10px 14px}
  .content{padding:14px}
  .live-tabs{overflow-x:auto}
}
</style>
</head>

const CATEGORIES = [...new Set(FILES.map(f=>f.category))].sort();

function getTypeBadgeClass(type) {
  const map={markdown:'badge-type',html:'badge-type',code:'badge-type',xlsx:'badge-type',csv:'badge-type',docx:'badge-type',png:'badge-type'};
  return map[type]||'badge-type';
}

function renderCategoryTree(activeCat) {
  const el=document.getElementById('catTree');
  const stored={};
  try{stored=JSON.parse(sessionStorage.getItem('tpl_cat_open')||'{}')}catch(e){}
  let html='';
  CATEGORIES.forEach(cat=>{
    const count=FILES.filter(f=>f.category===cat).length;
    const isOpen=stored[cat]||false;
    html+=`<div class="cat-item">
      <div class="cat-header${cat===activeCat?' active':''}" data-cat="${cat}">
        <span class="arrow${isOpen?' open':''}">&#9654;</span>
        <span>${cat}</span>
        <span class="badge">${count}</span>
      </div>
      <div class="cat-children${isOpen?' open':''}">
        <div class="cat-header sub" data-cat="${cat}" style="padding-left:38px;font-size:11px;color:#888;border-left:1px solid #333;margin-left:22px">
          View ${count} file${count!==1?'s':''} &rarr;
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
  document.querySelectorAll('.cat-header:not(.sub)').forEach(h=>{
    h.addEventListener('click',e=>{
      e.stopPropagation();
      const arrow=h.querySelector('.arrow');
      const children=h.parentElement.querySelector('.cat-children');
      const isNow=!children.classList.contains('open');
      children.classList.toggle('open');
      arrow.classList.toggle('open');
      const cat=h.dataset.cat;
      const stored2=JSON.parse(sessionStorage.getItem('tpl_cat_open')||'{}');
      stored2[cat]=isNow;
      sessionStorage.setItem('tpl_cat_open',JSON.stringify(stored2));
    });
  });
  document.querySelectorAll('.cat-header.sub').forEach(h=>{
    h.addEventListener('click',()=>{
      const cat=h.dataset.cat;
      filterByCategory(cat);
      document.querySelectorAll('.cat-header.active').forEach(a=>a.classList.remove('active'));
      const parent=h.closest('.cat-item').querySelector('.cat-header');
      if(parent)parent.classList.add('active');
    });
  });
  document.getElementById('catCount').textContent=CATEGORIES.length+' categories';
}

let currentFilter = null;
let currentSearch = '';

function filterByCategory(cat) {
  currentFilter=cat;
  document.getElementById('searchInput').value='';
  currentSearch='';
  renderFiles();
  document.querySelectorAll('.cat-header.active').forEach(a=>a.classList.remove('active'));
  document.querySelectorAll(`.cat-header[data-cat="${cat}"]`).forEach(h=>h.classList.add('active'));
}

function renderFiles() {
  const grid=document.getElementById('fileGrid');
  const empty=document.getElementById('empty');
  const counter=document.getElementById('counter');
  let filtered=FILES;
  if(currentFilter){
    filtered=filtered.filter(f=>f.category===currentFilter);
  }
  if(currentSearch){
    const s=currentSearch.toLowerCase();
    filtered=filtered.filter(f=>f.name.toLowerCase().includes(s)||f.path.toLowerCase().includes(s)||(f.agent||'').toLowerCase().includes(s));
  }
  counter.textContent=`Showing ${filtered.length} of ${FILES.length} files`;
  if(filtered.length===0){
    grid.innerHTML='';
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  let html='';
  filtered.forEach(f=>{
    const agentBadge=f.agent?`<span class="badge badge-agent">${f.agent}</span>`:'';
    const linesBadge=f.lines?`<span class="badge badge-lines">${f.lines}</span>`:'';
    const desc=f.description?`<div class="fdesc">${f.description}</div>`:'';
    html+=`<div class="file-card" data-path="${f.path}">
      <div class="fname">${f.name}</div>
      <div class="fpath">${f.path}</div>
      <div class="fmeta">
        <span class="badge badge-phase">P${f.phase}</span>
        <span class="badge ${getTypeBadgeClass(f.type)}">${f.type}</span>
        ${agentBadge}${linesBadge}
      </div>
      ${desc}
    </div>`;
  });
  grid.innerHTML=html;
  document.querySelectorAll('.file-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const path=card.dataset.path;
      document.querySelectorAll('.file-card.active').forEach(a=>a.classList.remove('active'));
      card.classList.add('active');
      openPreview(path);
    });
  });
}

function openPreview(path) {
  const file=FILES.find(f=>f.path===path);
  if(!file)return;
  const pane=document.getElementById('previewPane');
  const title=document.getElementById('previewTitle');
  const body=document.getElementById('previewBody');
  pane.classList.add('open');
  title.textContent=file.name;
  body.innerHTML='<div class="spinner">Loading</div>';
  if(file.type==='html'){
    body.innerHTML=`<iframe src="${file.path}"></iframe>`;
  }else if(file.type==='png'){
    body.innerHTML=`<img src="${file.path}" alt="${file.name}" style="max-width:100%">`;
  }else if(file.type==='xlsx'||file.type==='csv'||file.type==='docx'){
    body.innerHTML=`<p><a href="${file.path}" target="_blank">Open ${file.type.toUpperCase()} file &rarr;</a></p>`;
  }else if(file.type==='markdown'||file.type==='code'){
    fetch(file.path).then(r=>{
      if(!r.ok)throw new Error('Not found');
      return r.text();
    }).then(text=>{
      if(file.type==='code'){
        body.innerHTML=`<pre><code>${escapeHtml(text)}</code></pre>`;
      }else{
        body.innerHTML=renderMarkdown(text);
      }
    }).catch(()=>{
      body.innerHTML=`<p style="color:var(--red)">Could not load file: ${file.path}</p>`;
    });
  }
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(md){
  let html='';
  const lines=md.split('\n');
  let inCode=false,codeContent='',inTable=false,tableContent='',inList=false;
  for(let i=0;i<lines.length;i++){
    let line=lines[i];
    if(inCode){
      if(line.startsWith('```')){
        html+=`<pre><code>${escapeHtml(codeContent)}</code></pre>`;
        codeContent='';inCode=false;
        continue;
      }
      codeContent+=line+'\n';
      continue;
    }
    if(line.startsWith('```')){
      inCode=true;codeContent='';
      continue;
    }
    if(inTable){
      if(line.trim()===''||!line.includes('|')){
        html+=`<table>${tableContent}</table>`;
        tableContent='';inTable=false;
      }else{
        const isHeader=tableContent==='';
        const cells=line.split('|').filter(c=>c.trim()!=='');
        if(line.includes('---'))continue;
        let row='<tr>';
        cells.forEach(c=>{
          const tag=isHeader?'th':'td';
          row+=`<${tag}>${inlineMarkdown(c.trim())}</${tag}>`;
        });
        row+='</tr>';
        tableContent+=row;
        continue;
      }
    }
    if(line.includes('|')&&line.split('|').length>=3){
      inTable=true;
      tableContent='';
      const cells=line.split('|').filter(c=>c.trim()!=='');
      let row='<tr>';
      cells.forEach(c=>{
        row+=`<th>${inlineMarkdown(c.trim())}</th>`;
      });
      row+='</tr>';
      tableContent+=row;
      continue;
    }
    if(line.trim()===''){
      if(inList){html+='</ul>';inList=false;}
      html+=line+'\n';
      continue;
    }
    if(line.startsWith('# ')){
      if(inList){html+='</ul>';inList=false;}
      html+=`<h1>${inlineMarkdown(line.slice(2))}</h1>`;
    }else if(line.startsWith('## ')){
      if(inList){html+='</ul>';inList=false;}
      html+=`<h2>${inlineMarkdown(line.slice(3))}</h2>`;
    }else if(line.startsWith('### ')){
      if(inList){html+='</ul>';inList=false;}
      html+=`<h3>${inlineMarkdown(line.slice(4))}</h3>`;
    }else if(line.startsWith('#### ')){
      if(inList){html+='</ul>';inList=false;}
      html+=`<h4>${inlineMarkdown(line.slice(5))}</h4>`;
    }else if(line.startsWith('- ')){
      if(!inList){html+='<ul>';inList=true;}
      html+=`<li>${inlineMarkdown(line.slice(2))}</li>`;
    }else if(line.match(/^\d+\.\s/)){
      if(!inList){html+='<ol>';inList=true;}
      html+=`<li>${inlineMarkdown(line.replace(/^\d+\.\s/,''))}</li>`;
    }else if(line.startsWith('---')||line.startsWith('***')){
      if(inList){html+='</ul>';inList=false;}
      html+='<hr>';
    }else if(line.startsWith('> ')){
      if(inList){html+='</ul>';inList=false;}
      html+=`<blockquote>${inlineMarkdown(line.slice(2))}</blockquote>`;
    }else{
      if(inList){html+='</ul>';inList=false;}
      html+=`<p>${inlineMarkdown(line)}</p>`;
    }
  }
  if(inCode)html+=`<pre><code>${escapeHtml(codeContent)}</code></pre>`;
  if(inTable)html+=`<table>${tableContent}</table>`;
  if(inList)html+='</ul>';
  return html;
}

function inlineMarkdown(t){
  if(!t)return '';
  let s=escapeHtml(t);
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/`(.+?)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  return s;
}

let liveOpen = false;

function renderLiveTabs() {
  const el=document.getElementById('liveTabs');
  let groups={};
  LIVE_PAGES.forEach(p=>{
    if(!groups[p.group])groups[p.group]=[];
    groups[p.group].push(p);
  });
  let html='';
  Object.keys(groups).forEach(group=>{
    html+=`<span style="font-size:10px;color:#888;padding:4px 4px 0;font-family:'Barlow Condensed';letter-spacing:.05em;align-self:flex-end">${group}</span>`;
    groups[group].forEach((p,i)=>{
      html+=`<div class="live-tab" data-path="${p.path}" data-name="${p.name}">${p.name}</div>`;
    });
  });
  el.innerHTML=html;
  el.querySelectorAll('.live-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      el.querySelectorAll('.live-tab.active').forEach(a=>a.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('liveFrame').src=tab.dataset.path;
    });
  });
  // Activate first tab
  const first=el.querySelector('.live-tab');
  if(first){
    first.classList.add('active');
    document.getElementById('liveFrame').src=first.dataset.path;
  }
}

function toggleLiveView(show) {
  liveOpen=show;
  const fileView=document.getElementById('fileView');
  const liveView=document.getElementById('liveView');
  const liveBtn=document.getElementById('liveBtn');
  if(show){
    fileView.classList.add('hidden');
    liveView.classList.add('open');
    liveBtn.classList.add('active');
    liveBtn.textContent='Browse Files';
  }else{
    fileView.classList.remove('hidden');
    liveView.classList.remove('open');
    liveBtn.classList.remove('active');
    liveBtn.textContent='Live Pages';
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  renderCategoryTree();
  renderFiles();
  renderLiveTabs();
  document.getElementById('searchInput').addEventListener('input',e=>{
    if(liveOpen)return;
    currentSearch=e.target.value;
    currentFilter=null;
    document.querySelectorAll('.cat-header.active').forEach(a=>a.classList.remove('active'));
    renderFiles();
  });
  document.getElementById('viewAllBtn').addEventListener('click',()=>{
    toggleLiveView(false);
    currentFilter=null;
    currentSearch='';
    document.getElementById('searchInput').value='';
    document.querySelectorAll('.cat-header.active').forEach(a=>a.classList.remove('active'));
    renderFiles();
  });
  document.getElementById('liveBtn').addEventListener('click',()=>{
    toggleLiveView(!liveOpen);
  });
  document.getElementById('previewClose').addEventListener('click',()=>{
    document.getElementById('previewPane').classList.remove('open');
    document.querySelectorAll('.file-card.active').forEach(a=>a.classList.remove('active'));
  });
});
